<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #18181d;
      --border: #2a2a32;
      --border2: #3a3a45;
      --text: #e8e8f0;
      --text-muted: #5a5a6e;
      --accent: #e8e8f0;
      --user-bg: #1f1f2e;
      --user-text: #e8e8f0;
      --ai-bg: #18181d;
      --thinking-bg: #141420;
      --thinking-border: #2a2a45;
      --red: #f87171;
      --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.2);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Geist Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .model-tag {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--border);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .reasoning-btn {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .reasoning-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e11;
    }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      color: var(--text-muted);
    }

    .icon-btn:hover { border-color: var(--border2); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    #messages::-webkit-scrollbar-track { background: transparent; }

    .msg-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .message-group {
      margin-bottom: 20px;
      animation: slideIn 0.25s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 5px;
      border: 1px solid #2e2e42;
      box-shadow: var(--shadow);
      display: inline-block;
      max-width: 78%;
    }

    .bubble.ai {
      background: var(--ai-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow);
      max-width: 90%;
    }

    .bubble.thinking {
      background: var(--thinking-bg);
      border: 1px dashed var(--thinking-border);
      color: var(--text-muted);
      font-size: 12px;
      border-radius: 12px;
      max-width: 90%;
      margin-bottom: 8px;
    }

    .thinking-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      opacity: 0.7;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .thinking-label::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .bubble.error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--red);
      max-width: 90%;
    }

    /* typing dots */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 16px;
    }

    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dot 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── EMPTY STATE ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      text-align: center;
      padding: 40px;
    }

    #empty .glyph {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 64px;
      color: var(--text);
      opacity: 0.07;
      line-height: 1;
    }

    #empty h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      opacity: 0.22;
      letter-spacing: -0.02em;
    }

    #empty p {
      font-size: 11px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.9;
      opacity: 0.6;
    }

    /* ── INPUT AREA ── */
    #input-area {
      flex-shrink: 0;
      padding: 12px 24px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .input-container {
      max-width: 720px;
      margin: 0 auto;
    }

    .textarea-wrap {
      position: relative;
      background: rgba(255,255,255,0.03);
      border-radius: 28px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .textarea-wrap:focus-within {
      border-color: var(--border2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    #user-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      color: var(--text);
      resize: none;
      padding: 16px 54px 16px 22px;
      line-height: 1.5;
      min-height: 56px;
      max-height: 200px;
      overflow-y: auto;
      display: block;
      border-radius: 28px;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border2); }

    #send-btn {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px; height: 34px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }

    #send-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #0e0e11;
    }

    #send-btn:disabled { cursor: not-allowed; opacity: 0.6; }
    #send-btn svg { width: 15px; height: 15px; }

    .spin-square {
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 3px;
      animation: spinSlow 3s linear infinite;
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .status-line {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: 0.05em;
      height: 14px;
      transition: opacity 0.3s;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #input-area { padding: 10px 16px 16px; }
      .msg-wrap { padding: 0 16px; }
      .bubble { font-size: 13.5px; }
      .bubble.user { max-width: 88%; }
      .model-tag { display: none; }
      .header-title h1 { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Chat</h1>
    <span class="model-tag">step-3.5-flash · free</span>
  </div>
  <div class="header-right">
    <button class="reasoning-btn active" id="reasoning-btn" onclick="toggleReasoning()">◎ reasoning</button>
    <button class="icon-btn" onclick="clearChat()" title="Clear chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </div>
</header>

<div id="messages">
  <div id="empty">
    <div class="glyph">Aa</div>
    <h2>What's on your mind?</h2>
    <p>Powered by Step 3.5 Flash. Type below to start.</p>
  </div>
</div>

<div id="input-area">
  <div class="input-container">
    <div class="textarea-wrap">
      <textarea
        id="user-input"
        placeholder="Ask me anything…"
        rows="1"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg id="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="status-line" id="status-line">Ready</div>
  </div>
</div>

<script>
  const API_KEY = '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';
  const MODEL   = 'stepfun/step-3.5-flash:free';

  let history     = [];
  let loading     = false;
  let reasoningOn = true;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function toggleReasoning() {
    reasoningOn = !reasoningOn;
    const btn = document.getElementById('reasoning-btn');
    btn.classList.toggle('active', reasoningOn);
    btn.textContent = reasoningOn ? '◎ reasoning' : '○ reasoning';
  }

  function clearChat() {
    if (history.length && !confirm('Clear this conversation?')) return;
    history = [];
    document.getElementById('messages').innerHTML = `
      <div id="empty">
        <div class="glyph">Aa</div>
        <h2>What's on your mind?</h2>
        <p>Powered by Step 3.5 Flash. Type below to start.</p>
      </div>`;
    setStatus('Ready');
  }

  function setStatus(t) { document.getElementById('status-line').textContent = t; }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function removeEmpty() {
    const el = document.getElementById('empty');
    if (el) el.remove();
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function appendUser(text) {
    removeEmpty();
    const msgs = document.getElementById('messages');
    const g = document.createElement('div');
    g.className = 'message-group';
    g.innerHTML = `<div class="msg-wrap"><div style="display:flex;justify-content:flex-end"><div class="bubble user">${esc(text)}</div></div></div>`;
    msgs.appendChild(g);
    scrollBottom();
  }

  function appendTyping() {
    removeEmpty();
    const msgs = document.getElementById('messages');
    const g = document.createElement('div');
    g.id = 'typing-row';
    g.className = 'message-group';
    g.innerHTML = `<div class="msg-wrap"><div class="bubble ai" style="padding:0;display:inline-block"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    msgs.appendChild(g);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function appendAssistant(content, reasoning) {
    removeTyping();
    const msgs = document.getElementById('messages');
    const g = document.createElement('div');
    g.className = 'message-group';
    let inner = '';
    if (reasoning && reasoningOn) {
      inner += `<div class="bubble thinking"><div class="thinking-label">Reasoning trace</div>${esc(reasoning)}</div>`;
    }
    inner += `<div class="bubble ai">${esc(content)}</div>`;
    g.innerHTML = `<div class="msg-wrap">${inner}</div>`;
    msgs.appendChild(g);
    scrollBottom();
  }

  function appendError(msg) {
    removeTyping();
    const msgs = document.getElementById('messages');
    const g = document.createElement('div');
    g.className = 'message-group';
    g.innerHTML = `<div class="msg-wrap"><div class="bubble error">${esc(msg)}</div></div>`;
    msgs.appendChild(g);
    scrollBottom();
  }

  function setLoadingBtn(on) {
    const btn  = document.getElementById('send-btn');
    const icon = document.getElementById('send-icon');
    btn.disabled = on;
    if (on) {
      icon.style.display = 'none';
      const sq = document.createElement('div');
      sq.className = 'spin-square';
      sq.id = 'spin-sq';
      btn.appendChild(sq);
    } else {
      const sq = document.getElementById('spin-sq');
      if (sq) sq.remove();
      icon.style.display = '';
    }
  }

  async function sendMessage() {
    if (loading) return;
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    loading = true;
    setLoadingBtn(true);
    setStatus('AI is thinking…');

    appendUser(text);
    history.push({ role: 'user', content: text });
    appendTyping();

    try {
      const body = { model: MODEL, messages: history };
      if (reasoningOn) body.reasoning = { enabled: true };

      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Private AI Chat'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);

      const msg = data.choices?.[0]?.message;
      if (!msg) throw new Error('Empty response from model.');

      const content   = msg.content || '(no content)';
      const reasoning = extractReasoning(msg);

      const entry = { role: 'assistant', content };
      if (msg.reasoning_details) entry.reasoning_details = msg.reasoning_details;
      history.push(entry);

      appendAssistant(content, reasoning);
      setStatus('Ready');
    } catch (err) {
      appendError(`Error: ${err.message}`);
      setStatus('Error — try again');
    }

    loading = false;
    setLoadingBtn(false);
    input.focus();
  }

  function extractReasoning(msg) {
    if (!reasoningOn) return null;
    if (msg.reasoning_details?.length) {
      const parts = msg.reasoning_details
        .filter(d => d.type === 'thinking' && d.thinking)
        .map(d => d.thinking);
      if (parts.length) return parts.join('\n\n');
    }
    return msg.reasoning || null;
  }

  document.getElementById('user-input').focus();
</script>
</body>
</html>
